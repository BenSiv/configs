---
- name: Remove old manual Antigravity installation (cleanup)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /opt/antigravity
    - /usr/local/bin/antigravity

- name: Install Development Packages
  apt:
    name:
      - lua5.1
      - liblua5.1-0-dev
      - libsecret-1-0
      - libnotify4
      - libnss3
      - libxkbcommon0
      - libgbm1
      - libasound2t64
      - libgtk-3-0t64
      - luarocks
      - gcc
    state: present

- name: Install Lua Packages
  command:
    cmd: "luarocks install {{ item }}"
  register: luarocks_result
  changed_when: "'is already installed' not in luarocks_result.stderr and 'is already installed' not in luarocks_result.stdout"
  failed_when: 
    - luarocks_result.rc != 0
    - "'is already installed' not in luarocks_result.stderr"
    - "'is already installed' not in luarocks_result.stdout"
  loop:
    - luafilesystem
    - lua-yaml
    - dkjson

- name: Ensure APT keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download and dearmor Antigravity GPG key
  shell: |
    set -o pipefail
    curl -fsSL {{ antigravity_repo_key_url }} | gpg --dearmor --batch --yes -o {{ antigravity_keyring_path }}
  args:
    executable: /bin/bash
    creates: "{{ antigravity_keyring_path }}"

- name: Add Antigravity APT repository
  apt_repository:
    repo: "{{ antigravity_repo_url }}"
    state: present
    filename: antigravity

- name: Install Antigravity
  apt:
    name: antigravity
    state: latest
    update_cache: yes

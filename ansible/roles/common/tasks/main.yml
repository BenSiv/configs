---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes


- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - git
      - make
      - fd-find
      - ripgrep
      - jq
      - tree
      - micro
      - sqlite3
      - pandoc
      - texlive-xetex
      - build-essential
      - pass
      - gnupg
    state: present
  become: yes


- name: Install Quarto
  block:
    - name: Download Quarto deb package
      get_url:
        url: "https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.550/quarto-1.4.550-linux-amd64.deb"
        dest: "/tmp/quarto-1.4.550-linux-amd64.deb"
        mode: '0644'

    - name: Install Quarto package using apt
      apt:
        deb: "/tmp/quarto-1.4.550-linux-amd64.deb"
        state: present
      become: yes

    - name: Clean up Quarto deb package
      file:
        path: "/tmp/quarto-1.4.550-linux-amd64.deb"
        state: absent


- name: Download Google Chrome .deb
  get_url:
    url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
    dest: /tmp/google-chrome-stable_current_amd64.deb

- name: Install Google Chrome
  apt:
    deb: /tmp/google-chrome-stable_current_amd64.deb
  become: yes


- name: Create symlink for fd
  file:
    src: /usr/bin/fdfind
    dest: /usr/bin/fd
    state: link
  ignore_errors: yes
  become: yes

- name: Set timezone to America/Los_Angeles
  timezone:
    name: "America/Los_Angeles"
  become: yes

- name: Generate en_US.UTF-8 locale
  locale_gen:
    name: en_US.UTF-8
    state: present
  become: yes


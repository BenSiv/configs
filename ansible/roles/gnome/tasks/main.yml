---
- name: Install GNOME Tools
  apt:
    name:
      - ubuntu-desktop-minimal
      - gnome-tweaks
      - dconf-cli
      - pipx
      - gnome-shell-extension-manager
      - gnome-shell-extension-manager
    state: present
  become: yes


- name: Remove Bloatware
  apt:
    name:
      - aisleriot
      - gnome-mahjongg
      - gnome-mines
      - firefox
      - gnome-sudoku
      - libreoffice-core
      - libreoffice-common
      - libreoffice-calc
      - libreoffice-draw
      - libreoffice-gnome
      - libreoffice-gtk3
      - libreoffice-impress
      - libreoffice-math
      - libreoffice-writer
      - rhythmbox
      - shotwell
      - thunderbird
      - transmission-common
      - transmission-gtk
      - remmina
    state: absent
    purge: yes
  become: yes


- name: Install gnome-extensions-cli
  community.general.pipx:
    name: gnome-extensions-cli
    state: present

- name: Install Gesture Improvements Extension
  command:
    cmd: "{{ ansible_env.HOME }}/.local/bin/gnome-extensions-cli install gestureImprovements@gestures"
  register: extension_install
  changed_when: "'Installing' in extension_install.stdout"
  ignore_errors: yes

- name: Enable Gesture Improvements Extension
  command:
    cmd: "{{ ansible_env.HOME }}/.local/bin/gnome-extensions-cli enable gestureImprovements@gestures"
  ignore_errors: yes

- name: Compile Gesture Improvements Schemas
  command:
    cmd: "glib-compile-schemas {{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/gestureImprovements@gestures/schemas/"
  changed_when: false

- name: Configure Gesture Improvements - Enable Window Manipulation
  dconf:
    key: "/org/gnome/shell/extensions/gestureImprovements/enable-window-manipulation-gesture"
    value: "true"

- name: Configure Gesture Improvements - 3-Finger Pinch (Show Desktop)
  dconf:
    key: "/org/gnome/shell/extensions/gestureImprovements/pinch-3-finger-gesture"
    value: "'SHOW_DESKTOP'"

- name: Configure Gesture Improvements - 4-Finger Pinch (None)
  dconf:
    key: "/org/gnome/shell/extensions/gestureImprovements/pinch-4-finger-gesture"
    value: "'NONE'"


- name: Install Blur My Shell Extension
  command:
    cmd: "{{ ansible_env.HOME }}/.local/bin/gnome-extensions-cli install blur-my-shell@aunetx"
  register: blur_install
  changed_when: "'Installing' in blur_install.stdout"
  ignore_errors: yes

- name: Enable Blur My Shell Extension
  command:
    cmd: "{{ ansible_env.HOME }}/.local/bin/gnome-extensions-cli enable blur-my-shell@aunetx"
  ignore_errors: yes

- name: Compile Blur My Shell Schemas
  command:
    cmd: "glib-compile-schemas {{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/blur-my-shell@aunetx/schemas/"
  changed_when: false

- name: Configure Blur My Shell - Main
  dconf:
    key: "/org/gnome/shell/extensions/blur-my-shell/settings-version"
    value: "1"

- name: Configure Blur My Shell - Panel
  dconf:
    key: "/org/gnome/shell/extensions/blur-my-shell/panel/blur"
    value: "true"

- name: Configure Blur My Shell - Overview
  dconf:
    key: "/org/gnome/shell/extensions/blur-my-shell/overview/blur"
    value: "true"

- name: Configure Blur My Shell - App Folders
  dconf:
    key: "/org/gnome/shell/extensions/blur-my-shell/appfolder/blur"
    value: "true"

- name: Configure Blur My Shell - Panel Dynamic Override
  dconf:
    key: "/org/gnome/shell/extensions/blur-my-shell/panel/override-background-dynamically"
    value: "true"

- name: Configure App Folder Children
  dconf:
    key: "/org/gnome/desktop/app-folders/folder-children"
    value: "['Utilities', 'System']"

- name: Configure Utilities App Folder
  dconf:
    key: "/org/gnome/desktop/app-folders/folders/Utilities/apps"
    value: "['org.gnome.Calculator.desktop', 'org.gnome.clocks.desktop', 'org.gnome.DiskUtility.desktop', 'org.gnome.baobab.desktop', 'org.gnome.Evince.desktop', 'org.gnome.FileRoller.desktop', 'org.gnome.font-viewer.desktop', 'org.gnome.Logs.desktop', 'org.gnome.PowerStats.desktop', 'org.gnome.seahorse.Application.desktop', 'org.gnome.SystemMonitor.desktop', 'org.gnome.tweaks.desktop', 'org.gnome.Usage.desktop', 'org.gnome.TextEditor.desktop', 'com.mattjakeman.ExtensionManager.desktop', 'yelp.desktop', 'org.gnome.Loupe.desktop', 'org.gnome.eog.desktop', 'org.gnome.Characters.desktop', 'org.gnome.Connections.desktop', 'info.desktop', 'vim.desktop', 'org.gnome.Zenity.desktop', 'gnome-abrt.desktop', 'gnome-system-log.desktop', 'org.gnome.Dictionary.desktop']"

- name: Configure System App Folder
  dconf:
    key: "/org/gnome/desktop/app-folders/folders/System/apps"
    value: "['org.gnome.Settings.desktop', 'gnome-session-properties.desktop', 'software-properties-gtk.desktop', 'nm-connection-editor.desktop', 'org.gnome.Shell.Extensions.desktop', 'gnome-language-selector.desktop', 'update-manager.desktop', 'software-properties-drivers.desktop', 'software-properties-livepatch.desktop', 'im-config.desktop', 'ibus-setup-table.desktop', 'org.freedesktop.IBus.Setup.desktop', 'gnome-initial-setup.desktop', 'ca.desrt.dconf-editor.desktop', 'firmware-updater_firmware-updater.desktop']"

- name: Configure System App Folder Name
  dconf:
    key: "/org/gnome/desktop/app-folders/folders/System/name"
    value: "'System'"

- name: Configure App Picker Layout (Order)
  dconf:
    key: "/org/gnome/shell/app-picker-layout"
    value: "[{'org.gnome.Terminal.desktop': <{'position': <0>}>, 'org.gnome.Nautilus.desktop': <{'position': <1>}>, 'google-chrome.desktop': <{'position': <2>}>, 'antigravity.desktop': <{'position': <3>}>, 'micro.desktop': <{'position': <4>}>, 'snap-store_ubuntu-software.desktop': <{'position': <5>}>, 'whatsapp-linux-app_whatsapp-linux-app.desktop': <{'position': <6>}>, 'Utilities': <{'position': <7>}>, 'System': <{'position': <8>}>}]"

- name: Create Pictures directory
  file:
    path: "{{ ansible_env.HOME }}/Pictures"
    state: directory

- name: Copy Wallpaper
  copy:
    src: "{{ playbook_dir }}/assets/cosy_cabin.png"
    dest: "{{ ansible_env.HOME }}/Pictures/cosy_cabin.png"
    force: no
    # Note: Assuming the source path relative to where we run this, or absolute.
    # Since we are essentially porting, I'll use the path from the current workspace if possible,
    # or fail gracefully. For now using the absolute path found in user context.
  ignore_errors: yes

- name: Set Dark Mode
  dconf:
    key: "/org/gnome/desktop/interface/color-scheme"
    value: "'prefer-dark'"

- name: Set Accent Color
  dconf:
    key: "/org/gnome/desktop/interface/accent-color"
    value: "'orange'"

- name: Set Wallpaper
  dconf:
    key: "/org/gnome/desktop/background/picture-uri"
    value: "'file:///home/bensiv/Pictures/cosy_cabin.png'"

- name: Set Wallpaper (Dark)
  dconf:
    key: "/org/gnome/desktop/background/picture-uri-dark"
    value: "'file:///home/bensiv/Pictures/cosy_cabin.png'"

- name: Disable Dynamic Workspaces
  dconf:
    key: "/org/gnome/mutter/dynamic-workspaces"
    value: "false"

- name: Set Number of Workspaces to 1
  dconf:
    key: "/org/gnome/desktop/wm/preferences/num-workspaces"
    value: "1"

- name: Show Date in Clock
  dconf:
    key: "/org/gnome/desktop/interface/clock-show-date"
    value: "true"

- name: Set 24h Clock
  dconf:
    key: "/org/gnome/desktop/interface/clock-format"
    value: "'24h'"

- name: Disable Fullscreen Keybinding Conflict
  dconf:
    key: "/org/gnome/desktop/wm/keybindings/toggle-fullscreen"
    value: "['<Control>Return']"

- name: Enable Tap-to-Click
  dconf:
    key: "/org/gnome/desktop/peripherals/touchpad/tap-to-click"
    value: "true"

- name: Enable Natural Scrolling
  dconf:
    key: "/org/gnome/desktop/peripherals/touchpad/natural-scroll"
    value: "true"

- name: Set Click Method to Fingers (2-finger tap = right click)
  dconf:
    key: "/org/gnome/desktop/peripherals/touchpad/click-method"
    value: "'fingers'"

- name: Install Panel Date Format Extension
  command:
    cmd: "{{ ansible_env.HOME }}/.local/bin/gnome-extensions-cli install panel-date-format@keiii.github.com"
  register: date_extension_install
  changed_when: "'Installing' in date_extension_install.stdout"
  ignore_errors: yes

- name: Show Battery Percentage
  dconf:
    key: "/org/gnome/desktop/interface/show-battery-percentage"
    value: "true"

- name: Configure Ubuntu Dock - Position Bottom
  dconf:
    key: "/org/gnome/shell/extensions/dash-to-dock/dock-position"
    value: "'BOTTOM'"

- name: Configure Ubuntu Dock - Disable Panel Mode (extend-height)
  dconf:
    key: "/org/gnome/shell/extensions/dash-to-dock/extend-height"
    value: "false"

- name: Configure Ubuntu Dock - Enable Auto Hide
  dconf:
    key: "/org/gnome/shell/extensions/dash-to-dock/dock-fixed"
    value: "false"

- name: Configure Ubuntu Dock - Remove Default Pinned Apps
  dconf:
    key: "/org/gnome/shell/favorite-apps"
    value: "@as []"

- name: Configure Ubuntu Dock - Disable Trash Icon
  dconf:
    key: "/org/gnome/shell/extensions/dash-to-dock/show-trash"
    value: "false"

- name: Configure Ubuntu Dock - Disable Home Icon
  dconf:
    key: "/org/gnome/shell/extensions/ding/show-home"
    value: "false"

- name: Enable Panel Date Format Extension
  command:
    cmd: "{{ ansible_env.HOME }}/.local/bin/gnome-extensions-cli enable panel-date-format@keiii.github.com"
  ignore_errors: yes

- name: Compile Panel Date Format Schemas
  command:
    cmd: "glib-compile-schemas {{ ansible_env.HOME }}/.local/share/gnome-shell/extensions/panel-date-format@keiii.github.com/schemas/"
  changed_when: false

- name: Configure Clock Format Extension
  dconf:
    key: "/org/gnome/shell/extensions/panel-date-format/format"
    value: "'%Y-%m-%d %H:%M'"

- name: Enable Fractional Scaling
  dconf:
    key: "/org/gnome/mutter/experimental-features"
    value: "['scale-monitor-framebuffer']"

- name: Configure Gnome Terminal Background Color
  dconf:
    key: "/org/gnome/terminal/legacy/profiles:/:b1dcc9dd-5262-4d8d-a863-c897e6d979b9/background-color"
    value: "'#303030'"

- name: Configure Gnome Terminal Use Theme Colors
  dconf:
    key: "/org/gnome/terminal/legacy/profiles:/:b1dcc9dd-5262-4d8d-a863-c897e6d979b9/use-theme-colors"
    value: "false"




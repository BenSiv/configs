---
- name: Configure Git Global
  git_config:
    name: "{{ item.key }}"
    scope: global
    value: "{{ item.value }}"
  loop:
    - { key: 'user.name', value: "BenSiv" }
    - { key: 'user.email', value: "bensiv92@gmail.com" }
    - { key: 'alias.tree', value: "log --graph --abbrev-commit --decorate --format=format:'%C(bold blue)%h%C(reset) - %C(bold cyan)%aD%C(reset) %C(bold green)(%ar)%C(reset)%C(bold yellow)%d%C(reset)%n'' %C(white)%s%C(reset) %C(dim white)- %an%C(reset)' --all" }
    - { key: 'alias.st', value: 'status' }
    - { key: 'alias.co', value: 'checkout' }
    - { key: 'init.defaultBranch', value: 'main' }
    - { key: 'push.default', value: 'current' }
    - { key: 'credential.helper', value: 'store' }
    - { key: 'core.editor', value: 'micro' }

- name: Create Projects directory
  file:
    path: "{{ user_home }}/Projects"
    state: directory
    owner: "{{ real_user }}"
    group: "{{ real_user }}"
    mode: '0755'

- name: Create Projects/external directory
  file:
    path: "{{ user_home }}/Projects/external"
    state: directory
    owner: "{{ real_user }}"
    group: "{{ real_user }}"
    mode: '0755'

- name: Ensure Projects subdirectories are owned by user
  file:
    path: "{{ user_home }}/Projects"
    state: directory
    owner: "{{ real_user }}"
    group: "{{ real_user }}"
    recurse: yes
  become: yes
  become_user: root

- name: Clone Personal Repositories
  git:
    repo: "{{ item }}"
    dest: "{{ user_home }}/Projects/{{ item | basename | splitext | first }}"
    recursive: yes
    update: no
  become: yes
  become_user: "{{ real_user }}"
  loop:
    - "https://github.com/BenSiv/configs.git"
    - "https://github.com/BenSiv/lua-utils.git"
    - "https://github.com/BenSiv/automations.git"
    - "https://github.com/BenSiv/brain-ex.git"
    - "https://github.com/BenSiv/luam.git"
    - "https://github.com/BenSiv/luametry.git"

- name: Clone External Repositories
  git:
    repo: "{{ item }}"
    dest: "{{ user_home }}/Projects/external/{{ item | basename | splitext | first }}"
    recursive: yes
    update: no
  become: yes
  become_user: "{{ real_user }}"
  loop:
    - "https://github.com/elalish/manifold.git"

- name: Symlink Dotfiles
  file:
    src: "{{ user_home }}/Projects/configs/{{ item.src }}"
    dest: "{{ user_home }}/{{ item.dest }}"
    state: link
    force: yes
  loop:
    - { src: 'bash/bashrc.sh', dest: '.bashrc' }
    - { src: 'bash/bash_aliases.sh', dest: '.bash_aliases' }

- name: Configure Micro
  block:
    - name: Check Micro config status
      stat:
        path: "{{ user_home }}/.config/micro"
      register: micro_conf

    - name: Remove Micro config if it is a directory and not a symlink
      file:
        path: "{{ user_home }}/.config/micro"
        state: absent
      when: micro_conf.stat.exists and micro_conf.stat.isdir and not micro_conf.stat.islnk

    - name: Symlink Micro Config Directory
      file:
        src: "{{ user_home }}/Projects/configs/micro"
        dest: "{{ user_home }}/.config/micro"
        state: link
        force: yes

- name: Configure Antigravity User Settings
  block:
    - name: Create Antigravity Config Directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ real_user }}"
        group: "{{ real_user }}"
        mode: '0755'
      become: yes
      become_user: root
      loop:
        - "{{ user_home }}/.config/Antigravity"
        - "{{ user_home }}/.config/Antigravity/User"
        - "{{ user_home }}/.antigravity"
        - "{{ user_home }}/.antigravity/extensions"

    - name: Symlink Antigravity Settings
      file:
        src: "{{ user_home }}/Projects/configs/vscode/{{ item.src }}"
        dest: "{{ user_home }}/.config/Antigravity/User/{{ item.dest }}"
        state: link
        owner: "{{ real_user }}"
        group: "{{ real_user }}"
        force: yes
      become: yes
      become_user: root
      loop:
        - { src: 'settings.json', dest: 'settings.json' }
        - { src: 'keys.json', dest: 'keybindings.json' }

- name: Symlink Antigravity Extensions
  file:
    src: "{{ user_home }}/Projects/luam/dev/vscode"
    dest: "{{ user_home }}/.antigravity/extensions/luam-lang"
    state: link
    owner: "{{ real_user }}"
    group: "{{ real_user }}"
    force: yes
  become: yes
  become_user: root
